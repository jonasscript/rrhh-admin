id: nequi_daviplata
name: Nequi / Daviplata (Colombia)
bank_name: Nequi
payment_type: transfer

identify:
  required:
    - "Nequi"
  optional:
    - "Daviplata"
    - "Transferencia"
    - "enviaste"
    - "recibiste"

fields:
  amount:
    - "(?:Valor|Monto)[:\\s$]*\\$?\\s*([\\d,\\.]+)"
    - "\\$\\s*([\\d,\\.]+)"

  currency:
    - "\\b(COP)\\b"

  date:
    - "(?:Fecha)[:\\s]*(\\d{1,2}/\\d{1,2}/\\d{4})"
    - "(?:Fecha)[:\\s]*(\\d{4}-\\d{2}-\\d{2})"
    - "(\\d{2}/\\d{2}/\\d{4})"

  reference_number:
    - "(?:Referencia|N[u첬]mero|Aprobaci[o처]n|Transacci[o처]n)[:\\s#]*([0-9A-Z]{6,20})"

  destination_account:
    - "(?:Celular|Tel[e챕]fono|N[u첬]mero)[:\\s]*(\\d{10})"

  sender_name:
    - "(?:Enviado\\s+por|De)[:\\s]+([A-Z횁횋횒횙횣횗][\\w찼챕챠처첬챰횁횋횒횙횣횗\\s]{4,50})"

  receiver_name:
    - "(?:Enviado\\s+a|Para)[:\\s]+([A-Z횁횋횒횙횣횗][\\w찼챕챠처첬챰횁횋횒횙횣횗\\s]{4,50})"
